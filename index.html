<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CCEP — Career Exploration</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,300;1,9..144,400;1,9..144,500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    :root {
      --cream:    #F9F7F3;
      --sand:     #EFE8DC;
      --sage:     #5B9462;
      --sage-lt:  #E4F0E5;
      --sage-dk:  #3D7044;
      --amber:    #D4874A;
      --amber-lt: #FBF0E6;
      --amber-dk: #A85E2A;
      --sky:      #4A8BB5;
      --sky-lt:   #E4F0F8;
      --tan:      #C4A882;
      --text:     #211E1B;
      --muted:    #857970;
      --border:   #DDD3C7;
      --white:    #FFFFFF;
    }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html { scroll-behavior:smooth; }
    body { background:var(--cream); font-family:'DM Sans',sans-serif; color:var(--text); -webkit-font-smoothing:antialiased; overflow-x:hidden; }
    body::before { content:""; position:fixed; inset:0; z-index:0; pointer-events:none; background-image:radial-gradient(circle,rgba(180,160,140,.18) 1px,transparent 1px); background-size:28px 28px; }
    #root { min-height:100vh; position:relative; }
    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-track { background:var(--sand); }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

    /* Animations */
    @keyframes fadeUp       { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeIn       { from{opacity:0} to{opacity:1} }
    @keyframes slideInRight { from{opacity:0;transform:translateX(44px)} to{opacity:1;transform:translateX(0)} }
    @keyframes slideInLeft  { from{opacity:0;transform:translateX(-44px)} to{opacity:1;transform:translateX(0)} }
    @keyframes slideRight   { from{opacity:0;transform:translateX(50px)} to{opacity:1;transform:translateX(0)} }
    @keyframes popIn        { from{opacity:0;transform:scale(.88)} to{opacity:1;transform:scale(1)} }
    @keyframes waveFloat    { 0%,100%{transform:translateY(0) scaleX(1)} 50%{transform:translateY(-14px) scaleX(1.02)} }
    @keyframes waveFloat2   { 0%,100%{transform:translateY(0)} 50%{transform:translateY(10px)} }
    @keyframes waveFloat3   { 0%,100%{transform:translateX(0)} 50%{transform:translateX(9px)} }
    @keyframes blobPulse    { 0%,100%{border-radius:62% 38% 56% 44%/54% 62% 38% 46%} 50%{border-radius:44% 56% 38% 62%/38% 44% 56% 62%} }
    @keyframes confettiFall { from{transform:translateY(-20px) rotate(0deg);opacity:1} to{transform:translateY(100vh) rotate(720deg);opacity:0} }

    .fade-up        { animation:fadeUp .45s cubic-bezier(.22,.68,0,1.1) both }
    .fade-in        { animation:fadeIn .4s ease both }
    .slide-in-right { animation:slideInRight .4s cubic-bezier(.22,.68,0,1.1) both }
    .slide-in-left  { animation:slideInLeft .4s cubic-bezier(.22,.68,0,1.1) both }
    .slide-right    { animation:slideRight .4s cubic-bezier(.22,.68,0,1.1) both }
    .pop-in         { animation:popIn .4s cubic-bezier(.22,.68,0,1.1) both }

    /* Interactive */
    input[type=range] { -webkit-appearance:none; appearance:none; background:transparent; cursor:pointer; width:100%; }
    textarea, input   { font-family:'DM Sans',sans-serif; }
    button            { font-family:'DM Sans',sans-serif; cursor:pointer; border:none; }
    .pill-opt:hover   { border-color:var(--tan)!important; }
    .btn-main:hover   { transform:translateY(-2px); box-shadow:0 10px 30px rgba(37,34,32,.24)!important; }
    .btn-ghost:hover  { background:var(--sand)!important; }
    .copy-btn:hover   { opacity:.85; transform:translateY(-1px); }
    .btn-primary:hover { transform:translateY(-2px); opacity:.9; }
    .career-card:hover { transform:translateY(-3px); box-shadow:0 8px 30px rgba(0,0,0,.1)!important; }
    .tool-card:hover   { transform:translateY(-5px); box-shadow:0 16px 48px rgba(0,0,0,.1)!important; }

    @media print {
      body::before, .wave-bg, .no-print { display:none!important; }
    }
  </style>
</head>

<div id="root"></div>
<script type="text/babel">

}

/* ══════════════════════════════════════════
   LANDING PAGE
══════════════════════════════════════════ */
const HOME_THEME = { bg:"#F9F7F3", w1:"#E6D4BC", w2:"#EEE4D6", w3:"#D4BCAA", blob:"#EADCC8" };

function Landing({ onGames, onForm }) {
  return (
    <>

      <div style={{position:"relative",zIndex:1,minHeight:"100vh",padding:"72px 20px 100px",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>

                <div style={{width:48,height:48,borderRadius:14,background:"var(--sky-lt)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>🏆</div>
              </div>
              <div style={{display:"inline-flex",alignItems:"center",gap:6,background:"var(--sage-lt)",border:"1.5px solid rgba(91,148,98,.25)",borderRadius:999,padding:"4px 12px",marginBottom:14}}>

              <div style={{display:"inline-flex",alignItems:"center",gap:6,background:"var(--amber-lt)",border:"1.5px solid rgba(212,135,74,.25)",borderRadius:999,padding:"4px 12px",marginBottom:14}}>
                <span style={{fontSize:10,fontWeight:700,color:"var(--amber-dk)",letterSpacing:"1.5px",textTransform:"uppercase"}}>Step 2</span>
              </div>
              <h2 style={{fontFamily:"'Fraunces',serif",fontSize:26,fontWeight:500,color:"var(--text)",marginBottom:10,lineHeight:1.15}}>Explore What's Next</h2>
              <p style={{color:"var(--muted)",fontSize:13.5,lineHeight:1.75,fontWeight:300,marginBottom:24}}>

              </p>
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:22}}>
                {["Career matches","Action plan","Scholarships"].map(l=>(

                ))}
              </div>
              <button style={{width:"100%",padding:"13px",borderRadius:12,background:"var(--amber)",color:"#fff",fontSize:14,fontWeight:600,transition:"all .2s",boxShadow:"0 4px 14px rgba(212,135,74,.3)"}}>

            <p style={{color:"var(--muted)",fontSize:13,fontWeight:300,lineHeight:1.7}}>

            </p>
          </div>
        </div>
      </div>
    </>
  );
}

/* ══════════════════════════════════════════
   CAREER GAMES
══════════════════════════════════════════ */
const GT = {
  home:    { bg:"#F9F7F3", w1:"#E6D4BC", w2:"#EEE4D6", w3:"#D4BCAA", blob:"#EADCC8" },
  swipe:   { bg:"#F3F8F4", w1:"#A8D4AC", w2:"#C4E4C8", w3:"#90C098", blob:"#B8DCBC" },
  bracket: { bg:"#F2F6FA", w1:"#94C4E0", w2:"#B4D8F4", w3:"#7AB0D0", blob:"#A4CCDE" },
  result:  { bg:"#FAF4EE", w1:"#E8BC8C", w2:"#F4D4B0", w3:"#D4A070", blob:"#ECCC9C" },
};

const CAREER_TYPES = {
  helper:   { name:"The Helper",   color:"var(--sage)",    colorLt:"var(--sage-lt)",  tagline:"You are built for careers that put people first", desc:"You get energy from making a real difference in someone's life. Whether it is in a hospital, a classroom, or a community center, you want to see your impact up close.", careers:["Registered Nurse","School Counselor","Physical Therapist","Social Worker","Special Education Teacher"] },
  maker:    { name:"The Maker",    color:"#B07840",        colorLt:"#FBF2E8",         tagline:"You are built for careers where things get built",  desc:"You would rather do than describe. You like seeing the results of your work at the end of the day. Trade skills, technical roles, and hands-on work are where you would thrive.", careers:["Electrician","HVAC Technician","Welder","Construction Manager","Automotive Technician"] },
  creator:  { name:"The Creator",  color:"#7A60B0",        colorLt:"#F2EEF8",         tagline:"You are built for careers that reward originality",  desc:"You see the world differently and want a career that uses that. Design, media, storytelling, and the arts are your territory. You want to put something into the world that feels like yours.", careers:["Graphic Designer","Film Director","Architect","Music Producer","UX Designer"] },
  analyst:  { name:"The Analyst",  color:"var(--sky)",     colorLt:"var(--sky-lt)",   tagline:"You are built for careers that reward deep thinking", desc:"You like figuring things out. Whether it is data, biology, finance, or code, you want a career that challenges your mind and rewards precision.", careers:["Data Scientist","Pharmacist","Financial Analyst","Research Scientist","Software Engineer"] },
  leader:   { name:"The Leader",   color:"var(--amber-dk)",colorLt:"var(--amber-lt)", tagline:"You are built for careers where you call the shots", desc:"You want to steer things. Whether that is your own business, a team, or a courtroom, you are drawn to roles where responsibility falls on you and you are energized by it.", careers:["Entrepreneur","Marketing Manager","Lawyer","Operations Manager","School Principal"] },

};

const QUESTIONS = [
  {text:"Helping someone through a tough situation feels genuinely rewarding to me",            types:["helper"]},
  {text:"I would rather build or fix something than sit and write a report",                    types:["maker"]},
  {text:"Coming up with original creative ideas is one of my real strengths",                   types:["creator"]},

  {text:"Working with numbers, data, or research does not stress me out",                       types:["analyst"]},
  {text:"Starting my own business someday actually sounds exciting",                            types:["leader"]},
  {text:"I would love a job that involves travel, outdoor work, or constantly changing environments", types:["explorer"]},
  {text:"I want to be the person people rely on when something goes wrong",                     types:["helper"]},

const CAREERS_16 = [
  {name:"Software Engineer",    tag:"Builds apps and websites",           desc:"Designs and writes code powering apps, websites, and products. Works on teams to solve complex technical problems."},
  {name:"Emergency Nurse",      tag:"Treats patients in crisis",          desc:"Provides urgent medical care in emergency rooms. One of the most fast-paced and high-impact healthcare roles."},

const BRACKET_PAIRS = [[0,15],[1,9],[2,12],[3,13],[4,6],[5,7],[8,11],[10,14]];
const ROUND_NAMES   = ["First Round","Quarterfinals","Semifinals","Championship"];
const DISC_PROMPTS  = [
  "Which would you actually enjoy doing on a regular Tuesday?",
  "Which one do you think you would be better at?",
  "Which career makes a bigger difference in the world?",
  "If you had to shadow one for a week, which would you pick?",
  "Which one would surprise people if you chose it?",
  "Which career has better job security 20 years from now?",
  "Which one would your family be more excited about?",
  "Which sounds more like you, even if it surprised you?",
];

function initBracket() {
  const r0 = BRACKET_PAIRS.map(([a,b])=>({a,b,winner:null}));
  return [r0, Array(4).fill(null).map(()=>({a:null,b:null,winner:null})), Array(2).fill(null).map(()=>({a:null,b:null,winner:null})), [{a:null,b:null,winner:null}]];
}
function advanceBracket(rounds,cr,cm,winnerIdx) {
  const nr=JSON.parse(JSON.stringify(rounds));
  nr[cr][cm].winner=winnerIdx;
  if(cr<3){nr[cr+1][Math.floor(cm/2)][cm%2===0?'a':'b']=winnerIdx;}
  return nr;
}

function SwipeGame({ onBack }) {
  const [phase,  setPhase]  = useState("intro");
  const [qIdx,   setQIdx]   = useState(0);
  const [scores, setScores] = useState({helper:0,maker:0,creator:0,analyst:0,leader:0,explorer:0});
  const [cardKey,setCardKey]= useState(0);

  const answer = (yes) => {
    if(yes){ const q=QUESTIONS[qIdx]; setScores(s=>{const ns={...s};q.types.forEach(t=>ns[t]++);return ns;}); }
    if(qIdx+1<QUESTIONS.length){setQIdx(i=>i+1);setCardKey(k=>k+1);}
    else setPhase("result");
  };
  const topType = Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];
  const ct = CAREER_TYPES[topType];
  const pct = Math.round((qIdx/QUESTIONS.length)*100);

  if(phase==="intro") return(
    <><WaveBG theme={GT.swipe}/>
    <div style={{position:"relative",zIndex:1,minHeight:"100vh",padding:"64px 20px 80px",display:"flex",alignItems:"center",justifyContent:"center"}}>
    <div style={{maxWidth:520,width:"100%"}}>
      <Glass style={{padding:40}}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{fontSize:44,marginBottom:14}}>🃏</div>
          <h2 style={{fontFamily:"'Fraunces',serif",fontSize:30,fontWeight:400,color:"var(--text)",margin:"0 0 12px",lineHeight:1.15}}>What kind of<br/><em>career person are you?</em></h2>
          <p style={{color:"var(--muted)",fontSize:14,lineHeight:1.8,fontWeight:300,marginBottom:10}}>We will show you 14 statements. For each one, tap <strong style={{color:"var(--sage-dk)"}}>That's me</strong> or <strong style={{color:"var(--muted)"}}>Not really</strong>.</p>
          <p style={{color:"var(--muted)",fontSize:13,lineHeight:1.75,fontWeight:300,fontStyle:"italic",padding:"10px 16px",background:"var(--sand)",borderRadius:12,marginBottom:24}}>On one screen? Read each statement out loud and vote as a group.</p>

    <div style={{position:"relative",zIndex:1,minHeight:"100vh",padding:"64px 20px 80px"}}>

      <Glass style={{padding:28,marginBottom:16}}><p style={{color:"var(--muted)",fontSize:14,lineHeight:1.85,fontWeight:300}}>{ct.desc}</p></Glass>
      <Glass style={{padding:28,marginBottom:16}}>
        <p style={{fontSize:11,fontWeight:700,color:"var(--muted)",letterSpacing:"2px",textTransform:"uppercase",marginBottom:14}}>Careers to explore</p>

    </div></div></>

function BracketGame({ onBack }) {
  const [phase,   setPhase]   = useState("intro");
  const [rounds,  setRounds]  = useState(initBracket);
  const [cr,      setCr]      = useState(0);
  const [cm,      setCm]      = useState(0);
  const [showView,setShowView]= useState(false);
  const [champion,setChampion]= useState(null);
  const [picking, setPicking] = useState(null);

  const selectWinner=(idx)=>{
    setPicking(idx);
    setTimeout(()=>{
      const nr=advanceBracket(rounds,cr,cm,idx);
      setRounds(nr); setPicking(null);
      const last=cm+1>=rounds[cr].length;
      if(cr===3){setChampion(CAREERS_16[idx]);setPhase("champion");}
      else if(last){setCr(r=>r+1);setCm(0);}
      else setCm(m=>m+1);
    },500);
  };

  const matchup=rounds[cr]&&rounds[cr][cm];
  const carA=matchup&&matchup.a!==null?CAREERS_16[matchup.a]:null;
  const carB=matchup&&matchup.b!==null?CAREERS_16[matchup.b]:null;
  const prompt=DISC_PROMPTS[(cr*4+cm)%DISC_PROMPTS.length];
  const reset=()=>{setRounds(initBracket());setCr(0);setCm(0);setPhase("intro");setChampion(null);setPicking(null);};

  if(showView) return(
    <><WaveBG theme={GT.bracket}/>
    <div style={{position:"relative",zIndex:1,minHeight:"100vh",padding:"48px 20px 80px"}}>
    <div style={{maxWidth:680,margin:"0 auto"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:28}}>
        <h2 style={{fontFamily:"'Fraunces',serif",fontSize:28,fontWeight:400,color:"var(--text)"}}>Bracket</h2>
        <button onClick={()=>setShowView(false)} style={{padding:"8px 20px",borderRadius:999,background:"var(--text)",color:"#fff",fontSize:13,fontWeight:600}}>Close</button>
      </div>
      {rounds.map((rnd,ri)=>(
        <div key={ri} style={{marginBottom:24}}>
          <p style={{fontSize:11,fontWeight:700,color:"var(--sky)",letterSpacing:"2px",textTransform:"uppercase",marginBottom:10}}>{ROUND_NAMES[ri]}</p>
          <div style={{display:"flex",flexDirection:"column",gap:7}}>
            {rnd.map((match,mi)=>{
              const a=match.a!==null?CAREERS_16[match.a]:null,b=match.b!==null?CAREERS_16[match.b]:null;
              const isCur=ri===cr&&mi===cm&&phase==="playing";
              return(
                <div key={mi} style={{display:"flex",alignItems:"center",gap:10,padding:"11px 16px",borderRadius:13,background:isCur?"rgba(74,139,181,.1)":"rgba(255,255,255,.7)",border:`1.5px solid ${isCur?"var(--sky)":"var(--border)"}`,backdropFilter:"blur(8px)"}}>
                  <span style={{fontSize:11.5,fontWeight:500,color:match.winner===match.a&&match.a!==null?"var(--sky)":match.a!==null?"var(--text)":"var(--border)",flex:1,textDecoration:match.winner!==null&&match.winner!==match.a&&match.a!==null?"line-through":"none",opacity:match.winner!==null&&match.winner!==match.a&&match.a!==null?.4:1}}>{a?a.name:"TBD"}</span>
                  <span style={{fontSize:11,fontWeight:700,color:"var(--border)"}}>vs</span>
                  <span style={{fontSize:11.5,fontWeight:500,color:match.winner===match.b&&match.b!==null?"var(--sky)":match.b!==null?"var(--text)":"var(--border)",flex:1,textAlign:"right",textDecoration:match.winner!==null&&match.winner!==match.b&&match.b!==null?"line-through":"none",opacity:match.winner!==null&&match.winner!==match.b&&match.b!==null?.4:1}}>{b?b.name:"TBD"}</span>
                  {match.winner!==null&&<span style={{fontSize:11,fontWeight:700,color:"var(--sky)",background:"var(--sky-lt)",borderRadius:999,padding:"3px 10px",whiteSpace:"nowrap"}}>{CAREERS_16[match.winner].name}</span>}
                </div>
              );
            })}
          </div>
        </div>
      ))}
      <p style={{color:"var(--muted)",fontSize:12,textAlign:"center",marginTop:12}}>Use your browser's print function to print this bracket.</p>
    </div></div></>
  );

  if(phase==="intro") return(
    <><WaveBG theme={GT.bracket}/>
    <div style={{position:"relative",zIndex:1,minHeight:"100vh",padding:"64px 20px 80px",display:"flex",alignItems:"center",justifyContent:"center"}}>
    <div style={{maxWidth:560,width:"100%"}}>
      <Glass style={{padding:40}}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{fontSize:44,marginBottom:14}}>🏆</div>
          <h2 style={{fontFamily:"'Fraunces',serif",fontSize:30,fontWeight:400,color:"var(--text)",margin:"0 0 12px",lineHeight:1.15}}>16 careers.<br/><em>One champion.</em></h2>
          <p style={{color:"var(--muted)",fontSize:14,lineHeight:1.8,fontWeight:300,marginBottom:10}}>Two careers face off each round. Your group votes on which they would rather do. The winner moves on.</p>
          <p style={{color:"var(--muted)",fontSize:13,lineHeight:1.75,fontWeight:300,fontStyle:"italic",padding:"10px 16px",background:"var(--sand)",borderRadius:12,marginBottom:20}}>The facilitator clicks the winner after the group votes by show of hands.</p>
        </div>
        <p style={{fontSize:11,fontWeight:700,color:"var(--muted)",letterSpacing:"2px",textTransform:"uppercase",marginBottom:12,textAlign:"center"}}>The field of 16</p>
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:24,justifyContent:"center"}}>
          {CAREERS_16.map(c=><span key={c.name} style={{fontSize:11.5,fontWeight:500,color:"var(--sky)",background:"var(--sky-lt)",borderRadius:999,padding:"5px 12px"}}>{c.name}</span>)}
        </div>
        <button onClick={()=>setPhase("playing")} style={{width:"100%",padding:"14px",borderRadius:999,background:"var(--sky)",color:"#fff",fontSize:15,fontWeight:600,transition:"all .22s",boxShadow:"0 4px 18px rgba(74,139,181,.3)",marginBottom:10}}>Start the bracket</button>
        <button onClick={onBack} className="btn-ghost" style={{width:"100%",padding:"12px",borderRadius:999,background:"transparent",border:"1.5px solid var(--border)",color:"var(--muted)",fontSize:14,transition:"all .2s"}}>Back</button>
      </Glass>
    </div></div></>
  );

  if(phase==="champion") return(
    <><WaveBG theme={GT.result}/>
    {Array.from({length:24}).map((_,i)=>(
      <div key={i} style={{position:"fixed",left:`${Math.random()*100}%`,top:`-${20+Math.random()*20}px`,width:`${8+Math.random()*8}px`,height:`${8+Math.random()*8}px`,background:["#5B9462","#D4874A","#4A8BB5","#7A60B0","#C08040","#E8A870"][i%6],borderRadius:Math.random()>.5?"50%":"3px",zIndex:2,animation:`confettiFall ${2+Math.random()*3}s ${Math.random()*1.5}s ease-in forwards`,opacity:.85}}/>
    ))}
    <div style={{position:"relative",zIndex:3,minHeight:"100vh",padding:"64px 20px 80px",display:"flex",alignItems:"center",justifyContent:"center"}}>
    <div style={{maxWidth:560,width:"100%",textAlign:"center"}}>
      <div className="pop-in">
        <p style={{fontSize:11,fontWeight:700,color:"var(--amber)",letterSpacing:"2.5px",textTransform:"uppercase",marginBottom:16}}>Your group's champion</p>
        <div style={{fontSize:54,marginBottom:14}}>🏆</div>
        <h1 style={{fontFamily:"'Fraunces',serif",fontSize:46,fontWeight:500,lineHeight:1.05,color:"var(--text)",marginBottom:8}}><em>{champion.name}</em></h1>
        <p style={{color:"var(--muted)",fontSize:16,marginBottom:28,fontWeight:300}}>{champion.tag}</p>
      </div>
      <Glass style={{padding:28,marginBottom:16,textAlign:"left"}}><p style={{fontFamily:"'Fraunces',serif",fontSize:17,fontWeight:300,fontStyle:"italic",color:"var(--text)",lineHeight:1.7}}>{champion.desc}</p></Glass>
      <Glass style={{padding:"16px 22px",marginBottom:18,background:"rgba(251,240,230,.88)",textAlign:"left"}}>
        <p style={{fontWeight:600,fontSize:13,color:"var(--amber-dk)",marginBottom:5}}>Keep going</p>
        <p style={{color:"var(--amber-dk)",fontSize:13.5,lineHeight:1.75,fontWeight:300,opacity:.85}}>Use <strong>Explore What's Next</strong> to get a personalised step-by-step plan for <strong>{champion.name}</strong>, including scholarships and local programs.</p>
      </Glass>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <button onClick={reset} className="btn-ghost" style={{padding:"13px",borderRadius:999,background:"rgba(255,255,255,.8)",border:"1.5px solid var(--border)",color:"var(--muted)",fontSize:13.5,fontWeight:500,transition:"all .2s"}}>Play again</button>
        <button onClick={onBack} style={{padding:"13px",borderRadius:999,background:"var(--text)",color:"#fff",fontSize:13.5,fontWeight:600,transition:"all .2s"}}>Back to games</button>
      </div>
    </div></div></>
  );

  // Matchup screen
  return(
    <><WaveBG theme={GT.bracket}/>
    <div style={{position:"relative",zIndex:1,minHeight:"100vh",padding:"48px 20px 80px"}}>
    <div style={{maxWidth:600,margin:"0 auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
        <div>
          <p style={{fontSize:11,fontWeight:700,color:"var(--sky)",letterSpacing:"2px",textTransform:"uppercase"}}>{ROUND_NAMES[cr]}</p>
          <p style={{fontSize:13,color:"var(--muted)",fontWeight:300,marginTop:2}}>Match {cm+1} of {rounds[cr].length}</p>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>setShowView(true)} style={{padding:"8px 14px",borderRadius:999,background:"rgba(255,255,255,.82)",border:"1.5px solid var(--border)",color:"var(--sky)",fontSize:12,fontWeight:600,backdropFilter:"blur(8px)"}}>View bracket</button>
          <button onClick={reset} style={{padding:"8px 14px",borderRadius:999,background:"transparent",border:"1.5px solid var(--border)",color:"var(--muted)",fontSize:12,fontWeight:500}}>Reset</button>
        </div>
      </div>
      <div style={{height:4,background:"var(--border)",borderRadius:2,marginBottom:28}}><div style={{height:"100%",borderRadius:2,background:"var(--sky)",transition:"width .3s ease",width:`${((cr*8+cm)/15)*100}%`}}/></div>
      <div key={`${cr}-${cm}`} className="fade-in" style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:14,alignItems:"center",marginBottom:20}}>
        {carA&&<div onClick={()=>!picking&&selectWinner(matchup.a)} className="career-card" style={{background:picking===matchup.a?"var(--sage-lt)":"rgba(255,255,255,.86)",backdropFilter:"blur(16px)",border:`2px solid ${picking===matchup.a?"var(--sage)":"rgba(221,211,199,.7)"}`,borderRadius:20,padding:"26px 18px",textAlign:"center",cursor:picking?"default":"pointer",transition:"all .22s",boxShadow:"0 4px 24px rgba(0,0,0,.07)",opacity:picking!==null&&picking!==matchup.a?.3:1}}>

          <p style={{fontSize:12,color:"var(--muted)",fontWeight:300}}>{carA.tag}</p>
        </div>}
        <div style={{textAlign:"center",flexShrink:0}}><p style={{fontFamily:"'Fraunces',serif",fontSize:20,fontWeight:400,fontStyle:"italic",color:"var(--muted)",opacity:.45}}>vs</p></div>

          <p style={{fontFamily:"'Fraunces',serif",fontSize:19,fontWeight:500,color:"var(--text)",lineHeight:1.2,marginBottom:7}}>{carB.name}</p>
          <p style={{fontSize:12,color:"var(--muted)",fontWeight:300}}>{carB.tag}</p>
        </div>}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:18}}>
        {[carA,carB].map((c,i)=>c&&<Glass key={i} style={{padding:"13px 15px"}}><p style={{fontSize:12.5,color:"var(--muted)",lineHeight:1.7,fontWeight:300}}>{c.desc}</p></Glass>)}
      </div>
      <Glass style={{padding:"13px 18px",textAlign:"center",marginBottom:20}}>
        <p style={{fontSize:11,fontWeight:700,color:"var(--muted)",letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:5}}>Talk it over</p>
        <p style={{fontFamily:"'Fraunces',serif",fontSize:15,fontWeight:300,fontStyle:"italic",color:"var(--text)"}}>{prompt}</p>
      </Glass>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <button onClick={()=>!picking&&selectWinner(matchup.a)} disabled={!!picking} style={{padding:"13px",borderRadius:13,background:picking===matchup.a?"var(--sage)":"rgba(255,255,255,.84)",backdropFilter:"blur(10px)",border:`2px solid ${picking===matchup.a?"var(--sage)":"var(--border)"}`,color:picking===matchup.a?"#fff":"var(--text)",fontSize:13.5,fontWeight:600,transition:"all .22s",opacity:!!picking&&picking!==matchup.a?.4:1}}>{carA?.name} wins</button>
        <button onClick={()=>!picking&&selectWinner(matchup.b)} disabled={!!picking} style={{padding:"13px",borderRadius:13,background:picking===matchup.b?"var(--sky)":"rgba(255,255,255,.84)",backdropFilter:"blur(10px)",border:`2px solid ${picking===matchup.b?"var(--sky)":"var(--border)"}`,color:picking===matchup.b?"#fff":"var(--text)",fontSize:13.5,fontWeight:600,transition:"all .22s",opacity:!!picking&&picking!==matchup.b?.4:1}}>{carB?.name} wins</button>
      </div>
    </div></div></>
  );
}

function buildCareerPrompt(f) {
  const debtMap={none:"no debt",under5k:"up to $5,000","5to20k":"$5,000 to $20,000","20to50k":"$20,000 to $50,000",over50k:"over $50,000"};

  const sd=(v,lo,hi)=>v<=1?lo:v===2?`slightly prefers ${lo}`:v===3?"neutral":v===4?`leans toward ${hi}`:hi;
  const interests=[...f.interests,...(f.interestOther.trim()?[f.interestOther.trim()]:[])];
  return `You are a career counselor helping a high school student explore realistic career options. Based on their profile below, provide exactly 5 career recommendations that genuinely fit who they are.

STUDENT PROFILE:
- Current grade: ${f.grade||"high school"}
- Location: ${locStr}
- Maximum years of education or training before working: ${f.trainingYears===8?"8 or more years":f.trainingYears===0?"0 years, wants to start immediately":`${f.trainingYears} year${f.trainingYears!==1?"s":""}`}

- Salary goal 10 years into career: $${f.salaryGoal10.toLocaleString()} per year
- Preferred work environment: ${f.environment.length?f.environment.join(", "):"no preference"}
- Employment preference: ${f.bossPreference||"no preference"}
- Schedule preference: ${f.schedule||"no preference"}
- Travel preference: ${f.travel||"no preference"}
- Physical vs. desk-based work: ${sd(f.physicalLevel,"strongly prefers desk-based or mental work","strongly prefers physical, hands-on work")}
- Importance of creativity: ${sd(f.creativityLevel,"creativity is not important","creativity is essential")}
- Routine vs. variety: ${sd(f.routineLevel,"strongly prefers consistent routine","strongly prefers variety and new challenges")}
- Career path preference: ${f.stability||"not specified"}
- Collaboration style: ${f.collaboration||"not specified"}
- Public speaking comfort: ${f.publicSpeaking||"not specified"}
- Social impact importance: ${f.socialImpact||"not specified"}
- Interests: ${interests.length?interests.join(", "):"not specified"}
${f.existingSkills?`- Existing skills and experience: ${f.existingSkills}`:""}
${f.otherNotes?`- Additional context: ${f.otherNotes}`:""}

For each of the 5 careers, follow this exact format:

[Career Title]
What you would do: Describe the day-to-day work in 2 to 3 plain sentences a teenager can understand. Be specific about tasks, not just the job title.
Training path: Describe the specific steps to enter this field. Name exact certifications, program types, schools, or licensing requirements. Include how long each step takes and what order to complete them.
How to prepare right now: List 3 to 4 specific things this student can do while still in high school to build toward this career. Include relevant classes, clubs, skills to develop, and part-time work or volunteer ideas.
Local opportunities in ${locStr}: Name 2 to 3 specific schools, training programs, or organizations in the area where the student can get started.

Write in clear, encouraging language. Include a mix of training levels — at least one option that does not require a 4-year degree.`;
}

function buildPathwayPrompt(f) {
  const cities=f.location.filter(l=>l!=="open to relocating anywhere");
  const willRelocate=f.location.includes("open to relocating anywhere");
  const locStr=cities.length?cities.join(" and ")+(willRelocate?", and open to relocating":""):willRelocate?"anywhere in the US":"the DC/Baltimore area";
  const interests=[...f.interests,...(f.interestOther.trim()?[f.interestOther.trim()]:[])];
  return `You are a college and career counselor for a ${f.grade||"high school"} student in ${locStr}. Create a focused, actionable plan to help them explore and prepare for careers that match their profile.

STUDENT BACKGROUND:
- Grade: ${f.grade||"high school"}
- Location: ${locStr}
- Interests: ${interests.length?interests.join(", "):"varied"}
- Career path preference: ${f.stability||"not specified"}
- Work environment preference: ${f.environment.length?f.environment.join(", "):"no preference"}
- Collaboration style: ${f.collaboration||"not specified"}
- Social impact importance: ${f.socialImpact||"not specified"}
- Target starting salary: $${f.salaryGoal.toLocaleString()} per year
- 10-year salary goal: $${f.salaryGoal10.toLocaleString()} per year
- Maximum training years: ${f.trainingYears===0?"wants to start immediately after graduation":`${f.trainingYears} year${f.trainingYears!==1?"s":""}`}
- Comfort with debt: ${f.debtTolerance||"flexible"}
${f.existingSkills?`- Existing skills: ${f.existingSkills}`:""}
${f.otherNotes?`- Additional context: ${f.otherNotes}`:""}

Write a practical action plan using exactly these three sections in this order. Limit each section to a maximum of 5 items. Name real organizations, programs, and opportunities in ${locStr} wherever possible.

1. WHAT TO DO NOW IN HIGH SCHOOL
List up to 5 specific, actionable steps this student can start this semester. Focus on things that directly connect to their interests — relevant classes, clubs, volunteering, certifications available to high schoolers, and entry-level work experience. Prioritize options in ${locStr}.

2. SUMMER OPPORTUNITIES
List up to 5 specific paid or unpaid summer programs, internships, or experiences available to high school students in or near ${locStr} that connect to their interests. For each, name the program, who runs it, and how to apply or find out more.

List up to 5 real, named scholarships this student should look into. For each include: the scholarship name, who it is for, the approximate award amount, and where to apply. Focus on scholarships for DC and Maryland students, first-generation students, and students pursuing fields related to their interests.

Write in plain, direct language. Every item should be something the student can act on.`;
}

function FRange({label,hint,value,min,max,step,onChange,fmt}){const pct=((value-min)/(max-min))*100;return(<div style={{marginBottom:30}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:4}}><p style={{fontWeight:600,fontSize:13,color:"var(--text)"}}>{label}</p><span style={{fontFamily:"'Fraunces',serif",fontSize:21,fontWeight:400,color:"var(--sage)"}}>{fmt(value)}</span></div>{hint&&<p style={{color:"var(--muted)",fontSize:12,marginBottom:12,lineHeight:1.65,fontWeight:300}}>{hint}</p>}<div style={{position:"relative",height:2,background:"var(--border)",borderRadius:1}}><div style={{position:"absolute",left:0,top:0,height:"100%",width:`${pct}%`,background:"var(--sage)",borderRadius:1,transition:"width .1s"}}/><input type="range" min={min} max={max} step={step} value={value} onChange={e=>onChange(Number(e.target.value))} style={{position:"absolute",top:-13,left:0,width:"100%",height:28,opacity:0}}/><div style={{position:"absolute",top:-8,left:`calc(${pct}% - 9px)`,width:18,height:18,borderRadius:"50%",background:"var(--white)",border:"2px solid var(--sage)",boxShadow:"0 2px 8px rgba(0,0,0,.12)",pointerEvents:"none",transition:"left .1s"}}/></div><div style={{display:"flex",justifyContent:"space-between",marginTop:9}}><span style={{color:"var(--muted)",fontSize:11,fontWeight:300}}>{fmt(min)}</span><span style={{color:"var(--muted)",fontSize:11,fontWeight:300}}>{fmt(max)}</span></div></div>);}

function ExploreForm({ onBack }) {

      <FSectionTitle sub="How and where you prefer to spend your working hours.">Work style</FSectionTitle>
      <FMultiPill label="What kind of environment do you want to work in?" hint="Select all that appeal to you." options={ENV_OPTS} value={form.environment} onChange={v=>upd("environment",v)}/>
      <FPillStack label="Do you prefer working for yourself or within an organization?" options={BOSS_OPTS} value={form.bossPreference} onChange={v=>upd("bossPreference",v)}/>
      <FPillStack label="What kind of schedule fits your life?" options={SCHED_OPTS} value={form.schedule} onChange={v=>upd("schedule",v)}/>
      <FPillStack label="How do you feel about travel being part of your role?" options={TRAVEL_OPTS} value={form.travel} onChange={v=>upd("travel",v)}/>
    </>);
    if(step===2) return(<>
      <FSectionTitle sub="What matters most to you in the work you do.">Values</FSectionTitle>
      <FScale label="How physical or hands-on do you want your work to be?" hint="1 means entirely desk-based, 5 means entirely physical." value={form.physicalLevel} onChange={v=>upd("physicalLevel",v)}/>
      <FScale label="How important is creative expression or original thinking?" value={form.creativityLevel} onChange={v=>upd("creativityLevel",v)}/>
      <FScale label="Do you prefer a predictable routine or variety and new challenges?" hint="1 means strong preference for routine, 5 means strong preference for variety." value={form.routineLevel} onChange={v=>upd("routineLevel",v)}/>
      <FPillStack label="Which type of career path fits your mindset?" hint="Think about how much uncertainty you are comfortable with in exchange for potential reward." options={STABILITY_OPTS} value={form.stability} onChange={v=>upd("stability",v)}/>
      <FPillStack label="How do you prefer to work with others?" options={COLLAB_OPTS} value={form.collaboration} onChange={v=>upd("collaboration",v)}/>
      <FPillStack label="How comfortable are you with public speaking or presenting?" options={SPEAK_OPTS} value={form.publicSpeaking} onChange={v=>upd("publicSpeaking",v)}/>
      <FPillStack label="How much does social impact factor into your career decisions?" options={IMPACT_OPTS} value={form.socialImpact} onChange={v=>upd("socialImpact",v)}/>
    </>);
    if(step===3) return(<>
      <FSectionTitle sub="Select everything that genuinely resonates with you.">Interests</FSectionTitle>
      <FMultiPill label="What topics or activities interest you?" options={INTERESTS} value={form.interests} onChange={v=>upd("interests",v)}/>
      <div style={{marginBottom:20}}><FFieldLabel hint="Add anything not covered above.">Something else?</FFieldLabel><FTextBox value={form.interestOther} onChange={e=>upd("interestOther",e.target.value)} placeholder="Type any interest, hobby, or activity that matters to you" rows={2}/></div>
      <div><FFieldLabel hint="Things you already know how to do, inside or outside school.">Existing skills or experience</FFieldLabel><FTextBox value={form.existingSkills} onChange={e=>upd("existingSkills",e.target.value)} placeholder="e.g. video editing, restaurant work, basic coding, playing basketball" rows={2}/></div>
    </>);
    if(step===4) return(<>
      <FSectionTitle sub="A few details that help tailor advice to where you are right now.">Background</FSectionTitle>
      <FPillStack label="What grade are you currently in?" options={GRADE_OPTS} value={form.grade} onChange={v=>upd("grade",v)}/>
      <div><FFieldLabel hint="Anything relevant the questions above did not cover.">Anything else we should know? <span style={{color:"var(--muted)",fontWeight:300}}>(optional)</span></FFieldLabel><FTextBox value={form.otherNotes} onChange={e=>upd("otherNotes",e.target.value)} placeholder="e.g. I need to stay close to home, I speak Spanish, I have a specific health situation" rows={3}/></div>
    </>);
    if(step===5) return(<>
      <FSectionTitle sub="Used to find local programs, scholarships, and resources near you.">Location</FSectionTitle>
      <FMultiPill label="Where are you considering working and studying after graduation?" hint="Select all that apply." options={LOC_OPTS} value={form.location} onChange={v=>upd("location",v)}/>
      <div style={{background:"rgba(232,242,233,.88)",backdropFilter:"blur(10px)",borderRadius:16,padding:20,border:"1px solid var(--sage)",marginTop:8}}>
        <p style={{fontWeight:600,fontSize:13,color:"var(--sage-dk)",marginBottom:7}}>What happens next</p>
        <p style={{color:"#4E7854",fontSize:13.5,lineHeight:1.8,fontWeight:300}}>Your answers generate two ChatGPT prompts: one to find five careers matched to your profile, and one to get a focused action plan with steps to take now, summer programs to apply for, and scholarships to research.</p>
      </div>
    </>);
    return null;
  };

  if(formScreen==="result") return <FormResultScreen form={form} onBack={()=>setFormScreen("form")}/>;

  return(
    <><WaveBG theme={theme}/>
    <div style={{position:"relative",zIndex:1,minHeight:"100vh",padding:"56px 20px 80px"}}>
    <div style={{maxWidth:580,margin:"0 auto"}}>

      {/* Header */}
      <div className="fade-in" style={{marginBottom:40}}>
        <SchoolTag/>
        <h1 style={{fontFamily:"'Fraunces',serif",fontSize:50,fontWeight:400,lineHeight:1.06,color:"var(--text)",letterSpacing:"-.4px",marginBottom:12}}>Explore<br/><em>what's next.</em></h1>
        <p style={{color:"var(--muted)",fontSize:14,lineHeight:1.8,maxWidth:370,fontWeight:300}}>Answer a few questions about yourself. We will build a personalised prompt to find careers that fit your life.</p>
      </div>

      {/* Back to home */}
      <button onClick={onBack} className="btn-ghost" style={{display:"inline-flex",alignItems:"center",gap:6,padding:"7px 14px",borderRadius:999,background:"rgba(255,255,255,.75)",border:"1.5px solid var(--border)",color:"var(--muted)",fontSize:12.5,fontWeight:500,marginBottom:24,transition:"all .2s",backdropFilter:"blur(8px)"}}>← Back to home</button>

      {/* Progress */}
      <div style={{marginBottom:30}}>
        <div style={{display:"flex",gap:5,marginBottom:8}}>{FORM_STEPS.map((s,i)=>(<div key={s.id} style={{flex:1,height:4,borderRadius:4,background:i<=step?"var(--sage)":"var(--border)",opacity:i<step?.5:1,transition:"background .4s, opacity .4s"}}/>))}</div>
        <div style={{display:"flex",justifyContent:"space-between"}}><p style={{fontSize:12,color:"var(--sage)",fontWeight:700}}>{FORM_STEPS[step].label}</p><p style={{fontSize:12,color:"var(--muted)",fontWeight:400}}>{step+1} / {FORM_STEPS.length}</p></div>
      </div>

      {/* Card */}
      <div style={{background:"rgba(255,255,255,.82)",backdropFilter:"blur(20px)",borderRadius:22,border:"1px solid rgba(226,216,204,.72)",padding:28,marginBottom:16,boxShadow:"0 4px 36px rgba(0,0,0,.05)"}}>
        <StepTransition stepKey={step} direction={dir}>{renderStep()}</StepTransition>
      </div>

      {/* Nav */}
      <div style={{display:"flex",gap:10}}>
        {step>0&&<button onClick={goBack} className="btn-ghost" style={{flex:1,padding:"14px",background:"rgba(255,255,255,.74)",backdropFilter:"blur(10px)",border:"1.5px solid var(--border)",borderRadius:999,color:"var(--muted)",fontSize:14,fontWeight:400,transition:"all .2s"}}>Back</button>}
        {step<FORM_STEPS.length-1
          ?<button onClick={goNext} className="btn-main" style={{flex:2,padding:"14px 28px",background:"var(--text)",border:"none",borderRadius:999,color:"var(--white)",fontSize:14,fontWeight:600,letterSpacing:".15px",transition:"all .22s",boxShadow:"0 4px 18px rgba(37,34,32,.18)"}}>Continue</button>
          :<button onClick={()=>setFormScreen("result")} className="btn-main" style={{flex:2,padding:"14px 28px",background:"var(--sage)",border:"none",borderRadius:999,color:"var(--white)",fontSize:14,fontWeight:700,letterSpacing:".15px",transition:"all .22s",boxShadow:"0 4px 18px rgba(91,148,98,.32)"}}>Build my prompts</button>
        }
      </div>

      {/* Step labels */}
      <div style={{display:"flex",gap:4,marginTop:14}}>
        {FORM_STEPS.map((s,i)=>(<div key={s.id} style={{flex:1,textAlign:"center"}}><p style={{fontSize:9,color:i===step?"var(--amber)":"var(--border)",fontWeight:700,transition:"color .3s",textTransform:"uppercase",letterSpacing:".5px"}}>{s.label}</p></div>))}
      </div>

    </div></div></>
  );
}

/* ══════════════════════════════════════════
   ROOT APP
══════════════════════════════════════════ */
function App() {
  const [screen, setScreen] = useState("landing");
  if (screen === "games") return <GamesHub  onBack={() => setScreen("landing")}/>;
  if (screen === "form")  return <ExploreForm onBack={() => setScreen("landing")}/>;
  return <Landing onGames={() => setScreen("games")} onForm={() => setScreen("form")}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
